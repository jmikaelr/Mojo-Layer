name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emacs
        uses: purcell/setup-emacs@v5
        with:
          version: "29.4"

      - name: Run layer checks
        run: emacs -Q --batch -l scripts/ci-check.el
